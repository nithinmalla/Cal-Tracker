<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  
  <!-- Background -->
  <rect x="16" y="16" width="480" height="480" rx="80" fill="#1c1c1c"/>

  <!-- Progress Ring (light) -->
  <circle cx="256" cy="256" r="150"
          stroke="#ffffff"
          stroke-width="28"
          fill="none"
          stroke-linecap="round"
          stroke-dasharray="750"
          stroke-dashoffset="120"/>

  <!-- Progress Ring (dark track) -->
  <circle cx="256" cy="256" r="150"
          stroke="#555"
          stroke-width="28"
          fill="none"
          stroke-linecap="round"
          opacity="0.5"/>

  <!-- Fork -->
  <g fill="#ffffff">
    <!-- Handle -->
    <rect x="240" y="220" width="32" height="150" rx="16"/>
    
    <!-- Prongs -->
    <rect x="230" y="150" width="12" height="70" rx="6"/>
    <rect x="250" y="150" width="12" height="70" rx="6"/>
    <rect x="270" y="150" width="12" height="70" rx="6"/>
  </g>

</svg>
